name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            git pull origin main

            docker build -t claude-gitlab-mcp .

            docker stop claude-gitlab-mcp 2>/dev/null || true
            docker rm claude-gitlab-mcp 2>/dev/null || true

            docker run -d \
              --name claude-gitlab-mcp \
              --env-file .env \
              -p 3003:3003 \
              --restart unless-stopped \
              claude-gitlab-mcp

            docker ps --filter name=claude-gitlab-mcp --format "{{.Status}}"
